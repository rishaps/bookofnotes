<svg xmlns="http://www.w3.org/2000/svg" width="820" height="320" viewBox="0 0 820 320" role="img" aria-labelledby="title desc">
  <title id="title">Cube Roots of -i</title>
  <desc id="desc">Unit circle with three cube roots of -i.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#000000" />
    </marker>
  </defs>
  <line x1="120" y1="160" x2="720" y2="160" stroke="#000000" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="410" y1="260" x2="410" y2="60" stroke="#000000" stroke-width="2" marker-end="url(#arrow)" />

  <circle cx="410" cy="160" r="90" fill="none" stroke="#000000" stroke-width="2" />

  <circle cx="410" cy="70" r="5" fill="#000000" />
  <circle cx="332" cy="205" r="5" fill="#000000" />
  <circle cx="488" cy="205" r="5" fill="#000000" />

  <text x="420" y="60" font-family="Arial, sans-serif" font-size="14" fill="#000000">z0</text>
  <text x="300" y="220" font-family="Arial, sans-serif" font-size="14" fill="#000000">z1</text>
  <text x="500" y="220" font-family="Arial, sans-serif" font-size="14" fill="#000000">z2</text>

  <text x="700" y="150" font-family="Arial, sans-serif" font-size="14" fill="#000000">Real</text>
  <text x="420" y="80" font-family="Arial, sans-serif" font-size="14" fill="#000000">Imag</text>
  <text x="410" y="300" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#000000">Roots on the unit circle</text>
</svg>
