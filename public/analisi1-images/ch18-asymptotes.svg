<svg xmlns="http://www.w3.org/2000/svg" width="820" height="320" viewBox="0 0 820 320" role="img" aria-labelledby="title desc">
  <title id="title">Asymptotes</title>
  <desc id="desc">Graph of 1/x with vertical and horizontal asymptotes.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#000000" />
    </marker>
  </defs>

  <line x1="120" y1="160" x2="720" y2="160" stroke="#000000" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="410" y1="260" x2="410" y2="60" stroke="#000000" stroke-width="2" marker-end="url(#arrow)" />

  <line x1="410" y1="260" x2="410" y2="60" stroke="#000000" stroke-width="2" stroke-dasharray="6 6" />
  <line x1="120" y1="160" x2="720" y2="160" stroke="#000000" stroke-width="2" stroke-dasharray="6 6" />

  <path d="M440 110 C500 120 560 140 620 155" fill="none" stroke="#000000" stroke-width="2" />
  <path d="M380 210 C320 200 260 180 200 165" fill="none" stroke="#000000" stroke-width="2" />

  <text x="430" y="80" font-family="Arial, sans-serif" font-size="12" fill="#000000">x = 0</text>
  <text x="660" y="150" font-family="Arial, sans-serif" font-size="12" fill="#000000">y = 0</text>
</svg>
