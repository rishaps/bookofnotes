  </defs>

  <line x1="120" y1="220" x2="780" y2="220" stroke="#000000" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="120" y1="240" x2="120" y2="60" stroke="#000000" stroke-width="2" marker-end="url(#arrow)" />

  <path d="M140 120 C220 140 300 170 420 190 C520 205 640 215 760 218" fill="none" stroke="#000000" stroke-width="2" />
  <path d="M140 220 L140 120 C220 140 300 170 420 190 C520 205 640 215 760 218 L760 220 Z" fill="#e0e0e0" stroke="none" />

  <text x="740" y="235" font-family="Arial, sans-serif" font-size="12" fill="#000000">x</text>
  <text x="150" y="110" font-family="Arial, sans-serif" font-size="12" fill="#000000">1/x^2</text>
