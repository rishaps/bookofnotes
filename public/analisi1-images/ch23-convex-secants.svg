<svg xmlns="http://www.w3.org/2000/svg" width="820" height="320" viewBox="0 0 820 320" role="img" aria-labelledby="title desc">
  <title id="title">Convex Function and Secant</title>
  <desc id="desc">Convex curve with a secant and a tangent.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#000000" />
    </marker>
  </defs>

  <line x1="120" y1="240" x2="720" y2="240" stroke="#000000" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="120" y1="260" x2="120" y2="60" stroke="#000000" stroke-width="2" marker-end="url(#arrow)" />

  <path d="M160 220 C260 200 360 150 460 100 C520 80 600 70 680 80" fill="none" stroke="#000000" stroke-width="2" />

  <line x1="200" y1="210" x2="640" y2="90" stroke="#000000" stroke-width="2" />
  <text x="650" y="90" font-family="Arial, sans-serif" font-size="12" fill="#000000">secant</text>

  <circle cx="420" cy="120" r="5" fill="#000000" />
  <line x1="340" y1="155" x2="500" y2="85" stroke="#000000" stroke-width="2" />
  <text x="510" y="85" font-family="Arial, sans-serif" font-size="12" fill="#000000">tangent</text>
</svg>
