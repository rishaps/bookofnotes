<svg xmlns="http://www.w3.org/2000/svg" width="820" height="320" viewBox="0 0 820 320" role="img" aria-labelledby="title desc">
  <title id="title">Exponential Function</title>
  <desc id="desc">Curve for y = e^x passing through (0,1).</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#000000" />
    </marker>
  </defs>

  <line x1="120" y1="220" x2="720" y2="220" stroke="#000000" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="200" y1="260" x2="200" y2="60" stroke="#000000" stroke-width="2" marker-end="url(#arrow)" />

  <path d="M150 230 C220 225 280 200 330 165 C380 130 430 95 520 70" fill="none" stroke="#000000" stroke-width="2" />

  <circle cx="200" cy="200" r="4" fill="#000000" />
  <text x="210" y="195" font-family="Arial, sans-serif" font-size="14" fill="#000000">(0,1)</text>
  <text x="520" y="90" font-family="Arial, sans-serif" font-size="14" fill="#000000">y = e^x</text>
</svg>
