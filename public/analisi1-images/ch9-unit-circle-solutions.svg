<svg xmlns="http://www.w3.org/2000/svg" width="820" height="320" viewBox="0 0 820 320" role="img" aria-labelledby="title desc">
  <title id="title">Unit Circle Solutions</title>
  <desc id="desc">Solutions on the unit circle at angles 0, pi/2, pi, 3pi/2.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#000000" />
    </marker>
  </defs>
  <line x1="140" y1="160" x2="700" y2="160" stroke="#000000" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="420" y1="260" x2="420" y2="60" stroke="#000000" stroke-width="2" marker-end="url(#arrow)" />

  <circle cx="420" cy="160" r="90" fill="none" stroke="#000000" stroke-width="2" />

  <circle cx="510" cy="160" r="5" fill="#000000" />
  <circle cx="420" cy="70" r="5" fill="#000000" />
  <circle cx="330" cy="160" r="5" fill="#000000" />
  <circle cx="420" cy="250" r="5" fill="#000000" />

  <text x="510" y="150" font-family="Arial, sans-serif" font-size="14" text-anchor="start" fill="#000000">0</text>
  <text x="430" y="70" font-family="Arial, sans-serif" font-size="14" text-anchor="start" fill="#000000">pi/2</text>
  <text x="330" y="150" font-family="Arial, sans-serif" font-size="14" text-anchor="end" fill="#000000">pi</text>
  <text x="430" y="260" font-family="Arial, sans-serif" font-size="14" text-anchor="start" fill="#000000">3pi/2</text>

  <text x="420" y="300" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#000000">Solutions on the unit circle.</text>
</svg>
