<svg xmlns="http://www.w3.org/2000/svg" width="760" height="320" viewBox="0 0 760 320" role="img" aria-labelledby="title desc">
  <title id="title">Pascal Triangle</title>
  <desc id="desc">First rows of Pascal triangle used for binomial coefficients.</desc>
  <text x="380" y="30" font-family="Arial, sans-serif" font-size="20" text-anchor="middle" fill="#000000">Pascal Triangle</text>

  <g font-family="Arial, sans-serif" font-size="18" fill="#000000" text-anchor="middle">
    <text x="380" y="70">1</text>

    <text x="350" y="110">1</text>
    <text x="410" y="110">1</text>

    <text x="320" y="150">1</text>
    <text x="380" y="150">2</text>
    <text x="440" y="150">1</text>

    <text x="290" y="190">1</text>
    <text x="350" y="190">3</text>
    <text x="410" y="190">3</text>
    <text x="470" y="190">1</text>

    <text x="260" y="230">1</text>
    <text x="320" y="230">4</text>
    <text x="380" y="230">6</text>
    <text x="440" y="230">4</text>
    <text x="500" y="230">1</text>
  </g>

  <text x="380" y="280" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#000000">Each number is the sum of the two above it.</text>
</svg>
