<svg xmlns="http://www.w3.org/2000/svg" width="820" height="320" viewBox="0 0 820 320" role="img" aria-labelledby="title desc">
  <title id="title">Growth Rates</title>
  <desc id="desc">Comparison of log, linear, quadratic, and exponential growth.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#000000" />
    </marker>
  </defs>

  <line x1="120" y1="260" x2="720" y2="260" stroke="#000000" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="120" y1="280" x2="120" y2="60" stroke="#000000" stroke-width="2" marker-end="url(#arrow)" />

  <path d="M120 250 C200 245 280 240 360 235" fill="none" stroke="#000000" stroke-width="2" />
  <text x="360" y="230" font-family="Arial, sans-serif" font-size="12" fill="#000000">log n</text>

  <path d="M120 250 L360 210" fill="none" stroke="#000000" stroke-width="2" />
  <text x="360" y="205" font-family="Arial, sans-serif" font-size="12" fill="#000000">n</text>

  <path d="M120 250 C200 230 280 190 360 130" fill="none" stroke="#000000" stroke-width="2" />
  <text x="360" y="120" font-family="Arial, sans-serif" font-size="12" fill="#000000">n^2</text>

  <path d="M120 250 C200 230 260 190 300 140 C340 90 400 70 460 60" fill="none" stroke="#000000" stroke-width="2" />
  <text x="470" y="60" font-family="Arial, sans-serif" font-size="12" fill="#000000">exp n</text>
</svg>
