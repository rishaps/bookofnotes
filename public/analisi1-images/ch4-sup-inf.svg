<svg xmlns="http://www.w3.org/2000/svg" width="900" height="240" viewBox="0 0 900 240" role="img" aria-labelledby="title desc">
  <title id="title">Supremum and Infimum Example</title>
  <desc id="desc">Number line with open interval (0,1) showing inf and sup.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#000000" />
    </marker>
  </defs>

  <line x1="80" y1="120" x2="820" y2="120" stroke="#000000" stroke-width="2" marker-end="url(#arrow)" />

  <line x1="260" y1="120" x2="620" y2="120" stroke="#000000" stroke-width="4" />
  <circle cx="260" cy="120" r="7" fill="none" stroke="#000000" stroke-width="2" />
  <circle cx="620" cy="120" r="7" fill="none" stroke="#000000" stroke-width="2" />

  <text x="260" y="150" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#000000">0</text>
  <text x="620" y="150" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#000000">1</text>

  <text x="440" y="80" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#000000">E = (0,1)</text>
  <text x="260" y="190" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#000000">inf E = 0</text>
  <text x="620" y="190" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#000000">sup E = 1</text>
</svg>
