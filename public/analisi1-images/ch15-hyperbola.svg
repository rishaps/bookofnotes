<svg xmlns="http://www.w3.org/2000/svg" width="820" height="320" viewBox="0 0 820 320" role="img" aria-labelledby="title desc">
  <title id="title">Hyperbola</title>
  <desc id="desc">Hyperbola x^2 - y^2 = 1 with two branches.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#000000" />
    </marker>
  </defs>

  <line x1="120" y1="160" x2="720" y2="160" stroke="#000000" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="410" y1="260" x2="410" y2="60" stroke="#000000" stroke-width="2" marker-end="url(#arrow)" />

  <path d="M470 160 C520 150 580 120 640 80" fill="none" stroke="#000000" stroke-width="2" />
  <path d="M470 160 C520 170 580 200 640 240" fill="none" stroke="#000000" stroke-width="2" />

  <path d="M350 160 C300 150 240 120 180 80" fill="none" stroke="#000000" stroke-width="2" />
  <path d="M350 160 C300 170 240 200 180 240" fill="none" stroke="#000000" stroke-width="2" />

  <text x="520" y="90" font-family="Arial, sans-serif" font-size="14" fill="#000000">x^2 - y^2 = 1</text>
</svg>
