<svg xmlns="http://www.w3.org/2000/svg" width="820" height="320" viewBox="0 0 820 320" role="img" aria-labelledby="title desc">
  <title id="title">Sequence Limit</title>
  <desc id="desc">Points of a sequence approaching a limit L.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#000000" />
    </marker>
  </defs>

  <line x1="120" y1="240" x2="720" y2="240" stroke="#000000" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="120" y1="260" x2="120" y2="60" stroke="#000000" stroke-width="2" marker-end="url(#arrow)" />

  <line x1="120" y1="140" x2="720" y2="140" stroke="#000000" stroke-width="2" stroke-dasharray="6 6" />
  <text x="130" y="130" font-family="Arial, sans-serif" font-size="14" fill="#000000">L</text>

  <circle cx="170" cy="210" r="4" fill="#000000" />
  <circle cx="230" cy="190" r="4" fill="#000000" />
  <circle cx="290" cy="175" r="4" fill="#000000" />
  <circle cx="350" cy="165" r="4" fill="#000000" />
  <circle cx="410" cy="155" r="4" fill="#000000" />
  <circle cx="470" cy="148" r="4" fill="#000000" />
  <circle cx="530" cy="144" r="4" fill="#000000" />

  <text x="730" y="235" font-family="Arial, sans-serif" font-size="12" fill="#000000">n</text>
  <text x="110" y="70" font-family="Arial, sans-serif" font-size="12" fill="#000000">a_n</text>
</svg>
