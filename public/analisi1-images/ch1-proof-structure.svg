<svg xmlns="http://www.w3.org/2000/svg" width="800" height="240" viewBox="0 0 800 240" role="img" aria-labelledby="title desc">
  <title id="title">Proof Structure</title>
  <desc id="desc">Hypotheses lead through logical steps to the thesis.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#000000" />
    </marker>
  </defs>
  <rect x="40" y="80" width="200" height="80" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="140" y="128" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#000000">Hypotheses (P)</text>

  <rect x="300" y="80" width="200" height="80" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="400" y="120" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#000000">Logical steps</text>
  <text x="400" y="145" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#000000">(reasoning)</text>

  <rect x="560" y="80" width="200" height="80" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="660" y="128" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#000000">Thesis (Q)</text>

  <line x1="240" y1="120" x2="300" y2="120" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="500" y1="120" x2="560" y2="120" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
