<svg xmlns="http://www.w3.org/2000/svg" width="820" height="320" viewBox="0 0 820 320" role="img" aria-labelledby="title desc">
  <title id="title">Unit Circle</title>
  <desc id="desc">Point on the unit circle with cos and sin coordinates.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#000000" />
    </marker>
  </defs>

  <line x1="120" y1="160" x2="720" y2="160" stroke="#000000" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="410" y1="260" x2="410" y2="60" stroke="#000000" stroke-width="2" marker-end="url(#arrow)" />

  <circle cx="410" cy="160" r="90" fill="none" stroke="#000000" stroke-width="2" />

  <circle cx="490" cy="110" r="5" fill="#000000" />
  <line x1="410" y1="160" x2="490" y2="110" stroke="#000000" stroke-width="2" />
  <text x="500" y="105" font-family="Arial, sans-serif" font-size="14" fill="#000000">P</text>

  <text x="450" y="155" font-family="Arial, sans-serif" font-size="14" fill="#000000">cos(theta)</text>
  <text x="390" y="120" font-family="Arial, sans-serif" font-size="14" text-anchor="end" fill="#000000">sin(theta)</text>

  <text x="700" y="150" font-family="Arial, sans-serif" font-size="14" fill="#000000">Real</text>
  <text x="420" y="80" font-family="Arial, sans-serif" font-size="14" fill="#000000">Imag</text>
</svg>
