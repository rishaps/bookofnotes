<svg xmlns="http://www.w3.org/2000/svg" width="720" height="300" viewBox="0 0 720 300" role="img" aria-labelledby="title desc">
  <title id="title">Truth Table Layout</title>
  <desc id="desc">A simple truth table for two variables and a result column.</desc>
  <rect x="40" y="40" width="640" height="220" fill="none" stroke="#000000" stroke-width="2"/>

  <line x1="200" y1="40" x2="200" y2="260" stroke="#000000" stroke-width="2"/>
  <line x1="360" y1="40" x2="360" y2="260" stroke="#000000" stroke-width="2"/>
  <line x1="520" y1="40" x2="520" y2="260" stroke="#000000" stroke-width="2"/>

  <line x1="40" y1="90" x2="680" y2="90" stroke="#000000" stroke-width="2"/>
  <line x1="40" y1="135" x2="680" y2="135" stroke="#000000" stroke-width="1.5"/>
  <line x1="40" y1="180" x2="680" y2="180" stroke="#000000" stroke-width="1.5"/>
  <line x1="40" y1="225" x2="680" y2="225" stroke="#000000" stroke-width="1.5"/>

  <text x="120" y="75" font-family="Arial, sans-serif" font-size="20" text-anchor="middle" fill="#000000">p</text>
  <text x="280" y="75" font-family="Arial, sans-serif" font-size="20" text-anchor="middle" fill="#000000">q</text>
  <text x="440" y="75" font-family="Arial, sans-serif" font-size="20" text-anchor="middle" fill="#000000">p ∨ q</text>
  <text x="600" y="75" font-family="Arial, sans-serif" font-size="20" text-anchor="middle" fill="#000000">Result</text>

  <text x="120" y="120" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#000000">T</text>
  <text x="280" y="120" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#000000">T</text>
  <text x="440" y="120" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#000000">T</text>
  <text x="600" y="120" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#000000">T</text>

  <text x="120" y="165" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#000000">T</text>
  <text x="280" y="165" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#000000">F</text>
  <text x="440" y="165" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#000000">T</text>
  <text x="600" y="165" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#000000">T</text>

  <text x="120" y="210" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#000000">F</text>
  <text x="280" y="210" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#000000">T</text>
  <text x="440" y="210" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#000000">T</text>
  <text x="600" y="210" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#000000">T</text>

  <text x="120" y="255" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#000000">F</text>
  <text x="280" y="255" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#000000">F</text>
  <text x="440" y="255" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#000000">F</text>
  <text x="600" y="255" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#000000">F</text>
</svg>
