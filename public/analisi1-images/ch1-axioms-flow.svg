<svg xmlns="http://www.w3.org/2000/svg" width="800" height="360" viewBox="0 0 800 360" role="img" aria-labelledby="title desc">
  <title id="title">Axiomatic System Overview</title>
  <desc id="desc">Primitive notions and axioms leading to theorems.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#000000" />
    </marker>
  </defs>
  <rect x="40" y="50" width="280" height="90" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="180" y="95" font-family="Arial, sans-serif" font-size="20" text-anchor="middle" fill="#000000">Primitive notions</text>

  <rect x="480" y="50" width="280" height="90" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="620" y="95" font-family="Arial, sans-serif" font-size="20" text-anchor="middle" fill="#000000">Axioms</text>

  <rect x="240" y="210" width="320" height="90" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="400" y="255" font-family="Arial, sans-serif" font-size="20" text-anchor="middle" fill="#000000">Theorems</text>

  <line x1="180" y1="140" x2="330" y2="210" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="620" y1="140" x2="470" y2="210" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
