<svg xmlns="http://www.w3.org/2000/svg" width="800" height="280" viewBox="0 0 800 280" role="img" aria-labelledby="title desc">
  <title id="title">Logical Connectives</title>
  <desc id="desc">Inputs p and q feeding AND and OR, and a NOT operator for p.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#000000" />
    </marker>
  </defs>

  <text x="60" y="90" font-family="Arial, sans-serif" font-size="18" fill="#000000">p</text>
  <text x="60" y="170" font-family="Arial, sans-serif" font-size="18" fill="#000000">q</text>

  <line x1="80" y1="85" x2="220" y2="85" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="80" y1="165" x2="220" y2="165" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="220" y="60" width="140" height="50" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="290" y="92" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#000000">AND</text>

  <rect x="220" y="140" width="140" height="50" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="290" y="172" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#000000">OR</text>

  <line x1="360" y1="85" x2="470" y2="85" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="360" y1="165" x2="470" y2="165" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="470" y="60" width="140" height="50" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="540" y="92" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#000000">p ∧ q</text>

  <rect x="470" y="140" width="140" height="50" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="540" y="172" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#000000">p ∨ q</text>

  <text x="60" y="235" font-family="Arial, sans-serif" font-size="18" fill="#000000">p</text>
  <line x1="80" y1="230" x2="220" y2="230" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="220" y="205" width="140" height="50" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="290" y="237" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#000000">NOT</text>
  <line x1="360" y1="230" x2="470" y2="230" stroke="#000000" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="470" y="205" width="140" height="50" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="540" y="237" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#000000">¬p</text>
</svg>
