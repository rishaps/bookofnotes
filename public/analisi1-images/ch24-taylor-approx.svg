<svg xmlns="http://www.w3.org/2000/svg" width="820" height="320" viewBox="0 0 820 320" role="img" aria-labelledby="title desc">
  <title id="title">Taylor Approximation</title>
  <desc id="desc">Function and polynomial approximation near a point.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#000000" />
    </marker>
  </defs>

  <line x1="120" y1="240" x2="720" y2="240" stroke="#000000" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="120" y1="260" x2="120" y2="60" stroke="#000000" stroke-width="2" marker-end="url(#arrow)" />

  <path d="M140 220 C240 200 340 150 440 110 C520 85 600 75 680 80" fill="none" stroke="#000000" stroke-width="2" />
  <path d="M180 200 C260 180 340 150 420 130 C480 115 540 110 600 115" fill="none" stroke="#000000" stroke-width="2" stroke-dasharray="6 6" />

  <text x="690" y="85" font-family="Arial, sans-serif" font-size="12" fill="#000000">f(x)</text>
  <text x="610" y="125" font-family="Arial, sans-serif" font-size="12" fill="#000000">Taylor</text>
</svg>
