<svg xmlns="http://www.w3.org/2000/svg" width="820" height="240" viewBox="0 0 820 240" role="img" aria-labelledby="title desc">
  <title id="title">Primitive Relationship</title>
  <desc id="desc">Derivative and integral link between f and F.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#000000" />
    </marker>
  </defs>

  <rect x="120" y="70" width="180" height="80" fill="none" stroke="#000000" stroke-width="2" />
  <rect x="520" y="70" width="180" height="80" fill="none" stroke="#000000" stroke-width="2" />

  <text x="210" y="115" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#000000">f(x)</text>
  <text x="610" y="115" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#000000">F(x) + C</text>

  <line x1="300" y1="95" x2="520" y2="95" stroke="#000000" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="520" y1="125" x2="300" y2="125" stroke="#000000" stroke-width="2" marker-end="url(#arrow)" />

  <text x="410" y="85" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#000000">integral</text>
  <text x="410" y="145" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#000000">derivative</text>
</svg>
