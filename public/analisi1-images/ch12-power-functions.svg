<svg xmlns="http://www.w3.org/2000/svg" width="900" height="320" viewBox="0 0 900 320" role="img" aria-labelledby="title desc">
  <title id="title">Power Function Shapes</title>
  <desc id="desc">Typical shapes for x^2, x^3, and sqrt(x).</desc>

  <text x="160" y="40" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#000000">x^2</text>
  <line x1="110" y1="220" x2="210" y2="220" stroke="#000000" stroke-width="2" />
  <line x1="160" y1="240" x2="160" y2="120" stroke="#000000" stroke-width="2" />
  <path d="M110 220 Q160 120 210 220" fill="none" stroke="#000000" stroke-width="2" />

  <text x="450" y="40" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#000000">x^3</text>
  <line x1="400" y1="220" x2="500" y2="220" stroke="#000000" stroke-width="2" />
  <line x1="450" y1="240" x2="450" y2="110" stroke="#000000" stroke-width="2" />
  <path d="M400 230 C420 210 430 190 450 175 C470 160 480 140 500 120" fill="none" stroke="#000000" stroke-width="2" />

  <text x="740" y="40" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#000000">sqrt(x)</text>
  <line x1="690" y1="220" x2="790" y2="220" stroke="#000000" stroke-width="2" />
  <line x1="690" y1="240" x2="690" y2="110" stroke="#000000" stroke-width="2" />
  <path d="M690 220 Q720 180 790 150" fill="none" stroke="#000000" stroke-width="2" />
</svg>
