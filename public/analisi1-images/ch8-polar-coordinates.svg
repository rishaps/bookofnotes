<svg xmlns="http://www.w3.org/2000/svg" width="820" height="320" viewBox="0 0 820 320" role="img" aria-labelledby="title desc">
  <title id="title">Polar Coordinates</title>
  <desc id="desc">Point z in the complex plane with radius r and angle theta.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#000000" />
    </marker>
  </defs>
  <line x1="120" y1="180" x2="720" y2="180" stroke="#000000" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="420" y1="260" x2="420" y2="60" stroke="#000000" stroke-width="2" marker-end="url(#arrow)" />

  <text x="705" y="170" font-family="Arial, sans-serif" font-size="16" fill="#000000">Real</text>
  <text x="430" y="80" font-family="Arial, sans-serif" font-size="16" fill="#000000">Imag</text>

  <circle cx="560" cy="110" r="5" fill="#000000" />
  <line x1="420" y1="180" x2="560" y2="110" stroke="#000000" stroke-width="2" />
  <text x="570" y="100" font-family="Arial, sans-serif" font-size="16" fill="#000000">z</text>

  <path d="M470 180 A60 60 0 0 1 520 150" fill="none" stroke="#000000" stroke-width="2" />
  <text x="500" y="160" font-family="Arial, sans-serif" font-size="14" fill="#000000">theta</text>
  <text x="500" y="140" font-family="Arial, sans-serif" font-size="14" fill="#000000">r</text>
</svg>
