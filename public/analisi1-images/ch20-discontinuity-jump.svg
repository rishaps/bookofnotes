<svg xmlns="http://www.w3.org/2000/svg" width="820" height="300" viewBox="0 0 820 300" role="img" aria-labelledby="title desc">
  <title id="title">Jump Discontinuity</title>
  <desc id="desc">Step function with a jump at x = 0.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#000000" />
    </marker>
  </defs>

  <line x1="120" y1="200" x2="720" y2="200" stroke="#000000" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="420" y1="250" x2="420" y2="60" stroke="#000000" stroke-width="2" marker-end="url(#arrow)" />

  <line x1="120" y1="220" x2="420" y2="220" stroke="#000000" stroke-width="2" />
  <line x1="420" y1="140" x2="720" y2="140" stroke="#000000" stroke-width="2" />

  <circle cx="420" cy="220" r="6" fill="none" stroke="#000000" stroke-width="2" />
  <circle cx="420" cy="140" r="6" fill="#000000" />

  <text x="430" y="230" font-family="Arial, sans-serif" font-size="12" fill="#000000">0</text>
  <text x="710" y="190" font-family="Arial, sans-serif" font-size="12" fill="#000000">x</text>
</svg>
