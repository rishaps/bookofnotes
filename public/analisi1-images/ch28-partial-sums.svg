<svg xmlns="http://www.w3.org/2000/svg" width="820" height="300" viewBox="0 0 820 300" role="img" aria-labelledby="title desc">
  <title id="title">Partial Sums</title>
  <desc id="desc">Partial sums approaching a limit S.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#000000" />
    </marker>
  </defs>

  <line x1="120" y1="220" x2="720" y2="220" stroke="#000000" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="120" y1="240" x2="120" y2="60" stroke="#000000" stroke-width="2" marker-end="url(#arrow)" />

  <line x1="120" y1="140" x2="720" y2="140" stroke="#000000" stroke-width="2" stroke-dasharray="6 6" />
  <text x="130" y="130" font-family="Arial, sans-serif" font-size="12" fill="#000000">S</text>

  <circle cx="180" cy="190" r="4" fill="#000000" />
  <circle cx="240" cy="175" r="4" fill="#000000" />
  <circle cx="300" cy="165" r="4" fill="#000000" />
  <circle cx="360" cy="158" r="4" fill="#000000" />
  <circle cx="420" cy="150" r="4" fill="#000000" />
  <circle cx="480" cy="146" r="4" fill="#000000" />
  <circle cx="540" cy="143" r="4" fill="#000000" />

  <text x="720" y="210" font-family="Arial, sans-serif" font-size="12" fill="#000000">N</text>
</svg>
