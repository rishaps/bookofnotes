<svg xmlns="http://www.w3.org/2000/svg" width="820" height="320" viewBox="0 0 820 320" role="img" aria-labelledby="title desc">
  <title id="title">Conjugate Symmetry</title>
  <desc id="desc">Point z and its conjugate are symmetric about the real axis.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#000000" />
    </marker>
  </defs>
  <line x1="120" y1="160" x2="720" y2="160" stroke="#000000" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="420" y1="260" x2="420" y2="60" stroke="#000000" stroke-width="2" marker-end="url(#arrow)" />

  <text x="705" y="150" font-family="Arial, sans-serif" font-size="16" fill="#000000">Real</text>
  <text x="430" y="80" font-family="Arial, sans-serif" font-size="16" fill="#000000">Imag</text>

  <circle cx="540" cy="110" r="5" fill="#000000" />
  <circle cx="540" cy="210" r="5" fill="#000000" />
  <line x1="420" y1="160" x2="540" y2="110" stroke="#000000" stroke-width="2" />
  <line x1="420" y1="160" x2="540" y2="210" stroke="#000000" stroke-width="2" />

  <text x="550" y="100" font-family="Arial, sans-serif" font-size="16" fill="#000000">z</text>
  <text x="550" y="220" font-family="Arial, sans-serif" font-size="16" fill="#000000">z bar</text>

  <text x="420" y="290" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#000000">Conjugate is the reflection across the real axis.</text>
</svg>
