<svg xmlns="http://www.w3.org/2000/svg" width="820" height="320" viewBox="0 0 820 320" role="img" aria-labelledby="title desc">
  <title id="title">Local Extrema</title>
  <desc id="desc">Curve with a local maximum and minimum.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#000000" />
    </marker>
  </defs>

  <line x1="120" y1="240" x2="720" y2="240" stroke="#000000" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="120" y1="260" x2="120" y2="60" stroke="#000000" stroke-width="2" marker-end="url(#arrow)" />

  <path d="M140 220 C220 140 300 120 360 150 C430 190 500 210 600 160" fill="none" stroke="#000000" stroke-width="2" />

  <circle cx="300" cy="130" r="5" fill="#000000" />
  <circle cx="480" cy="200" r="5" fill="#000000" />

  <text x="310" y="120" font-family="Arial, sans-serif" font-size="12" fill="#000000">max</text>
  <text x="490" y="215" font-family="Arial, sans-serif" font-size="12" fill="#000000">min</text>
</svg>
