<svg xmlns="http://www.w3.org/2000/svg" width="820" height="320" viewBox="0 0 820 320" role="img" aria-labelledby="title desc">
  <title id="title">Sine Graph</title>
  <desc id="desc">One period of the sine function.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#000000" />
    </marker>
  </defs>

  <line x1="120" y1="160" x2="720" y2="160" stroke="#000000" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="120" y1="260" x2="120" y2="60" stroke="#000000" stroke-width="2" marker-end="url(#arrow)" />

  <path d="M120 160 C180 80 330 80 390 160 C450 240 600 240 660 160" fill="none" stroke="#000000" stroke-width="2" />

  <text x="120" y="180" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#000000">0</text>
  <text x="390" y="180" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#000000">pi</text>
  <text x="660" y="180" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#000000">2pi</text>
  <text x="730" y="150" font-family="Arial, sans-serif" font-size="12" fill="#000000">x</text>
  <text x="110" y="70" font-family="Arial, sans-serif" font-size="12" fill="#000000">y</text>
</svg>
