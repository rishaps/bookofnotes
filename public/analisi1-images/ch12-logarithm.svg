<svg xmlns="http://www.w3.org/2000/svg" width="820" height="320" viewBox="0 0 820 320" role="img" aria-labelledby="title desc">
  <title id="title">Logarithmic Function</title>
  <desc id="desc">Curve for y = ln(x) with vertical asymptote at x = 0.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#000000" />
    </marker>
  </defs>

  <line x1="120" y1="220" x2="720" y2="220" stroke="#000000" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="200" y1="260" x2="200" y2="60" stroke="#000000" stroke-width="2" marker-end="url(#arrow)" />

  <line x1="200" y1="260" x2="200" y2="60" stroke="#000000" stroke-width="2" stroke-dasharray="6 6" />
  <text x="210" y="80" font-family="Arial, sans-serif" font-size="12" fill="#000000">x = 0</text>

  <path d="M220 260 C250 220 300 190 360 175 C430 160 520 150 700 140" fill="none" stroke="#000000" stroke-width="2" />
  <text x="560" y="125" font-family="Arial, sans-serif" font-size="14" fill="#000000">y = ln(x)</text>
</svg>
