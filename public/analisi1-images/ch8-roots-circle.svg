<svg xmlns="http://www.w3.org/2000/svg" width="820" height="320" viewBox="0 0 820 320" role="img" aria-labelledby="title desc">
  <title id="title">Roots on a Circle</title>
  <desc id="desc">Equally spaced points on a circle representing n-th roots.</desc>
  <circle cx="410" cy="160" r="90" fill="none" stroke="#000000" stroke-width="2" />

  <circle cx="500" cy="160" r="5" fill="#000000" />
  <circle cx="455" cy="82" r="5" fill="#000000" />
  <circle cx="365" cy="82" r="5" fill="#000000" />
  <circle cx="320" cy="160" r="5" fill="#000000" />
  <circle cx="365" cy="238" r="5" fill="#000000" />
  <circle cx="455" cy="238" r="5" fill="#000000" />

  <line x1="410" y1="160" x2="500" y2="160" stroke="#000000" stroke-width="2" />
  <text x="455" y="150" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#000000">r</text>

  <text x="410" y="300" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#000000">n roots equally spaced on a circle</text>
</svg>
