<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="400" height="400">
  <!-- Sphere outline -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="black" stroke-width="2"/>
  
  <!-- Equator (front arc) -->
  <path d="M 20 100 Q 100 130 180 100" fill="none" stroke="black" stroke-width="1.5"/>
  
  <!-- Equator (back arc, dashed) -->
  <path d="M 20 100 Q 100 70 180 100" fill="none" stroke="black" stroke-width="1.5" stroke-dasharray="5,3"/>
  
  <!-- Meridian (front arc) -->
  <path d="M 100 20 Q 70 100 100 180" fill="none" stroke="black" stroke-width="1.5" stroke-dasharray="5,3"/>
  
  <!-- Meridian (back arc) -->
  <path d="M 100 20 Q 130 100 100 180" fill="none" stroke="black" stroke-width="1.5"/>

  <!-- Center point -->
  <circle cx="100" cy="100" r="2" fill="black"/>
  <text x="105" y="95" font-family="Arial" font-size="14">C</text>

  <!-- Radius -->
  <line x1="100" y1="100" x2="160" y2="60" stroke="blue" stroke-width="2"/>
  <text x="135" y="75" font-family="Arial" font-size="14" fill="blue">r</text>

  <!-- Point P -->
  <circle cx="160" cy="60" r="2" fill="black"/>
  <text x="165" y="55" font-family="Arial" font-size="14">P</text>
</svg>
