<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="800" height="600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#000" />
    </marker>
  </defs>

  <!-- Panel 1: Ellipse -->
  <g transform="translate(50, 50)">
    <text x="35" y="-10" font-family="Arial" font-size="14" font-weight="bold">Ellisse</text>
    <ellipse cx="60" cy="50" rx="40" ry="25" fill="none" stroke="blue" stroke-width="2"/>
    <line x1="20" y1="50" x2="100" y2="50" stroke="black" stroke-dasharray="3"/>
    <line x1="60" y1="25" x2="60" y2="75" stroke="black" stroke-dasharray="3"/>
    <circle cx="28" cy="50" r="2" fill="red"/> <!-- Focus 1 approx -->
    <circle cx="92" cy="50" r="2" fill="red"/> <!-- Focus 2 approx -->
  </g>

  <!-- Panel 2: Parabola -->
  <g transform="translate(250, 50)">
    <text x="25" y="-10" font-family="Arial" font-size="14" font-weight="bold">Parabola</text>
    <path d="M 20 20 Q 60 100 100 20" fill="none" stroke="green" stroke-width="2"/>
    <line x1="60" y1="20" x2="60" y2="90" stroke="black" stroke-dasharray="3"/> <!-- Axis -->
    <line x1="20" y1="80" x2="100" y2="80" stroke="black"/> <!-- Directrix -->
    <circle cx="60" cy="50" r="2" fill="red"/> <!-- Focus -->
  </g>

  <!-- Panel 3: Hyperbola -->
  <g transform="translate(50, 180)">
    <text x="30" y="-10" font-family="Arial" font-size="14" font-weight="bold">Iperbole</text>
    <!-- Left branch -->
    <path d="M 50 20 Q 30 50 50 80" fill="none" stroke="purple" stroke-width="2"/>
    <!-- Right branch -->
    <path d="M 70 20 Q 90 50 70 80" fill="none" stroke="purple" stroke-width="2"/>
    <!-- Asymptotes -->
    <line x1="30" y1="20" x2="90" y2="80" stroke="gray" stroke-dasharray="2"/>
    <line x1="90" y1="20" x2="30" y2="80" stroke="gray" stroke-dasharray="2"/>
  </g>

  <!-- Panel 4: Circle (Special Case) -->
  <g transform="translate(250, 180)">
    <text x="15" y="-10" font-family="Arial" font-size="14" font-weight="bold">Circonferenza</text>
    <circle cx="60" cy="50" r="30" fill="none" stroke="orange" stroke-width="2"/>
    <circle cx="60" cy="50" r="2" fill="black"/> <!-- Center -->
  </g>
</svg>
