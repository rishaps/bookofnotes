<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Axes -->
  <line x1="50" y1="250" x2="350" y2="250" stroke="black" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="200" y1="280" x2="200" y2="20" stroke="black" stroke-width="2" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#000" />
    </marker>
  </defs>

  <!-- Labels -->
  <text x="360" y="255" font-family="Arial" font-size="14">Re(z)</text>
  <text x="210" y="20" font-family="Arial" font-size="14">Im(z)</text>
  <text x="185" y="265" font-family="Arial" font-size="14">0</text>

  <!-- Vector z -->
  <line x1="200" y1="250" x2="300" y2="100" stroke="blue" stroke-width="2"/>
  <circle cx="300" cy="100" r="4" fill="blue"/>
  <text x="310" y="95" font-family="Arial" font-size="16" font-weight="bold" fill="blue">z = a + ib</text>

  <!-- Components -->
  <line x1="300" y1="100" x2="300" y2="250" stroke="gray" stroke-dasharray="4"/>
  <line x1="300" y1="100" x2="200" y2="100" stroke="gray" stroke-dasharray="4"/>
  <text x="300" y="265" font-family="Arial" font-size="14">a</text>
  <text x="185" y="105" font-family="Arial" font-size="14">b</text>

  <!-- Angle theta and Modulus rho -->
  <path d="M 230 250 A 30 30 0 0 0 225 210" fill="none" stroke="red"/>
  <text x="235" y="235" font-family="Arial" font-size="14" fill="red">θ</text>
  <text x="240" y="170" font-family="Arial" font-size="14" fill="blue">ρ = |z|</text>
</svg>
