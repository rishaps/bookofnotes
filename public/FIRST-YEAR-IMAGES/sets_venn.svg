<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300">
  <!-- Panel 1: Union -->
  <g transform="translate(0, 0)">
    <rect x="5" y="5" width="190" height="190" fill="none" stroke="gray"/>
    <text x="15" y="25" font-family="Arial" font-size="14">A ∪ B</text>
    <circle cx="70" cy="100" r="50" fill="rgba(0, 100, 255, 0.4)" stroke="black"/>
    <circle cx="130" cy="100" r="50" fill="rgba(0, 100, 255, 0.4)" stroke="black"/>
    <text x="50" y="100" font-family="Arial" font-size="16">A</text>
    <text x="140" y="100" font-family="Arial" font-size="16">B</text>
  </g>

  <!-- Panel 2: Intersection -->
  <g transform="translate(200, 0)">
    <rect x="5" y="5" width="190" height="190" fill="none" stroke="gray"/>
    <text x="15" y="25" font-family="Arial" font-size="14">A ∩ B</text>
    <circle cx="70" cy="100" r="50" fill="none" stroke="black"/>
    <circle cx="130" cy="100" r="50" fill="none" stroke="black"/>
    <!-- Intersection area -->
    <path d="M 100,60 A 50,50 0 0,1 100,140 A 50,50 0 0,1 100,60" fill="rgba(255, 0, 0, 0.5)"/>
    <text x="50" y="100" font-family="Arial" font-size="16">A</text>
    <text x="140" y="100" font-family="Arial" font-size="16">B</text>
  </g>

  <!-- Panel 3: Difference A \ B -->
  <g transform="translate(400, 0)">
    <rect x="5" y="5" width="190" height="190" fill="none" stroke="gray"/>
    <text x="15" y="25" font-family="Arial" font-size="14">A \ B</text>
     <!-- Circle B (white to mask A) needs to be on top if filled, but simpler to use clip or just distinct colors. 
         Let's use transparency layering. -->
    <circle cx="70" cy="100" r="50" fill="rgba(0, 200, 0, 0.5)" stroke="black"/>
    <circle cx="130" cy="100" r="50" fill="white" stroke="black"/> <!-- Masking effectively -->
    <!-- Redraw B outline -->
    <circle cx="130" cy="100" r="50" fill="none" stroke="black"/>
    
    <text x="50" y="100" font-family="Arial" font-size="16">A</text>
    <text x="140" y="100" font-family="Arial" font-size="16">B</text>
  </g>
</svg>
