<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="400" height="400">
  <!-- Circle -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="black" stroke-width="2"/>
  
  <!-- Center -->
  <circle cx="100" cy="100" r="3" fill="black"/>
  <text x="96" y="120" font-family="Arial" font-size="14">C</text>
  
  <!-- Radius -->
  <line x1="100" y1="100" x2="160" y2="65" stroke="red" stroke-width="2"/>
  <text x="135" y="75" font-family="Arial" font-size="14" fill="red">r</text>
  
  <!-- Point P -->
  <circle cx="160" cy="65" r="3" fill="black"/>
  <text x="165" y="65" font-family="Arial" font-size="14">P</text>
  
  <!-- Grid for reference (optional, keeps it clean) -->
  <line x1="20" y1="100" x2="180" y2="100" stroke="gray" stroke-width="0.5" stroke-dasharray="4"/>
  <line x1="100" y1="20" x2="100" y2="180" stroke="gray" stroke-width="0.5" stroke-dasharray="4"/>
</svg>
